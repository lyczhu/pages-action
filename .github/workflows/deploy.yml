name: CI/CD Pipeline - Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Verify required files exist
        run: |
          test -f index.html && echo "✅ index.html found"
          test -f style.css && echo "✅ style.css found"
          test -f script.js && echo "✅ script.js found"

      - name: Inject build info into index.html
        run: |
          node inject-build-info.js ${{ github.run_id }}
          echo "=== Verifying injection ==="
          if grep 'id="deploy-time">--<' index.html; then
            echo "ERROR: deploy-time still has placeholder value!"
            exit 1
          fi
          echo "✅ deploy-time injected"
          if grep 'id="build-number">--<' index.html; then
            echo "ERROR: build-number still has placeholder value!"
            exit 1
          fi
          echo "✅ build-number injected"

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5